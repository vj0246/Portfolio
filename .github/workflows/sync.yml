name: Sync Portfolio Data

on:
  # Run every day at midnight IST (18:30 UTC)
  schedule:
    - cron: '30 18 * * *'

  # Run on push to main, but skip pushes that only touch data/docs
  # (prevents the bot's own [skip ci] commit and README edits from looping)
  push:
    branches: [ main ]
    paths-ignore:
      - 'data/**'
      - '**.md'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# Least privilege: the job only needs to commit data back
permissions:
  contents: write

# Serialize runs so a scheduled run and a push run never race on git push
concurrency:
  group: sync-portfolio-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout portfolio repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: vj0246
        run: python scripts/fetch_data.py

      - name: Commit updated data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github_data.json
          git diff --staged --quiet || git commit -m "chore: sync github data [skip ci]"
          git push
